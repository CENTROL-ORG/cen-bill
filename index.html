<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEN PAY SYSTEM & BILLING REGISTRY</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg-base: #0d0e12;
            --bg-surface: #15171e;
            --bg-element: #1c1f27;
            --bg-element-hover: #232732;
            --border-color: #262a35;
            
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --accent-amber: #f1c40f;
            
            --text-primary: #f5f6fa;
            --text-secondary: #7f8c8d;
            --text-muted: #4b5563;
        }

        body { 
            background: var(--bg-base); 
            color: var(--text-primary); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 16px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container { 
            width: 100%; 
            max-width: 640px; 
            display: flex;
            flex-direction: column;
            gap: 16px; 
        }

        /* PREMIUM APP CARDS */
        .card { 
            background: var(--bg-surface); 
            border: 1px solid var(--border-color); 
            padding: 20px; 
            border-radius: 16px; 
            box-sizing: border-box; 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        /* OVERVIEW TOP DASHBOARD */
        h1.app-title {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 16px 0;
            text-align: center;
            color: var(--text-secondary);
        }

        .metrics { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
        }
        .metric-box { 
            background: var(--bg-element); 
            padding: 12px 10px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .metric-label { 
            font-size: 10px; 
            color: var(--text-secondary); 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }
        .metric-value { 
            font-size: 15px; 
            font-weight: 700; 
            font-family: 'SFMono-Regular', Consolas, monospace; 
        }

        /* CLEAN SEGMENTED TAB SYSTEM */
        .tab-navigation {
            display: flex;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            padding: 4px;
            border-radius: 12px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px 4px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            outline: none;
        }
        .tab-btn.active {
            background: var(--bg-element);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* VIEWPORT LAYER ARCHITECTURE */
        .tab-panel {
            display: none;
        }
        .tab-panel.active {
            display: block;
        }

        h2 { 
            margin-top: 0; 
            font-weight: 600; 
            font-size: 16px; 
            color: var(--text-primary); 
            padding-bottom: 12px; 
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        /* FLUID ROW ARCHITECTURES */
        .bill-row { 
            background: var(--bg-element); 
            padding: 14px 16px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 14px; 
            box-sizing: border-box;
        }
        .bill-clickable { cursor: pointer; transition: background 0.15s ease; }
        .bill-clickable:hover { background: var(--bg-element-hover); }
        .bill-info { display: flex; flex-direction: column; gap: 4px; }
        .bill-meta { font-size: 11px; color: var(--text-secondary); }
        
        /* EXPANDABLE COMPONENT MATRICES */
        .breakdown-container { 
            display: none; 
            background: #12141a; 
            margin-top: -14px; 
            margin-bottom: 12px; 
            padding: 6px 16px; 
            border: 1px solid var(--border-color); 
            border-top: none; 
            border-radius: 0 0 12px 12px; 
            box-sizing: border-box;
        }
        .breakdown-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 0; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 13px; 
        }
        .breakdown-row:last-child { border-bottom: none; }
        .breakdown-label { text-transform: capitalize; color: var(--text-secondary); }

        /* BUTTON SYSTEM SPECIFICATIONS */
        .btn-pay { 
            background: var(--bg-surface); 
            color: var(--text-primary); 
            border: 1px solid var(--border-color); 
            padding: 8px 14px; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 11px; 
            transition: all 0.15s ease;
            outline: none;
        }
        .btn-pay:hover { 
            background: var(--bg-element-hover); 
            border-color: var(--text-secondary);
        }
        .btn-pay-all { 
            background: var(--text-primary); 
            color: var(--bg-base); 
            border: none;
            padding: 8px 14px; 
            font-size: 11px; 
            border-radius: 8px; 
        }
        .btn-pay-all:hover { 
            background: #e5e7eb; 
        }

        /* FORMS & DATA CONTROLS */
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; color: var(--text-secondary); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { 
            width: 100%; 
            padding: 12px 14px; 
            background: var(--bg-element); 
            border: 1px solid var(--border-color); 
            color: var(--text-primary); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 14px; 
            outline: none; 
            transition: border-color 0.15s ease;
        }
        input:focus { border-color: #4b5563; }
        
        .btn-action { 
            width: 100%; 
            background: var(--text-primary); 
            color: var(--bg-base); 
            border: none; 
            padding: 14px; 
            border-radius: 10px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 14px; 
            transition: background 0.15s ease;
        }
        .btn-action:hover { background: #e5e7eb; }
        
        .list-box { max-height: 50vh; overflow-y: auto; padding-right: 2px; }
        .list-box::-webkit-scrollbar { width: 4px; }
        .list-box::-webkit-scrollbar-track { background: transparent; }
        .list-box::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* DECORATIVE SEMANTIC SYSTEM COLORS */
        .c-green { color: var(--accent-green); }
        .c-red { color: var(--accent-red); }
        .c-blue { color: var(--accent-blue); }
        .c-amber { color: var(--accent-amber); }
        
        .status-badge {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- FINANCIAL SUMMARY EXECUTIVE HUB -->
        <div class="card">
            <h1 class="app-title">CEN Accounts Registry</h1>
            <div class="metrics">
                <div class="metric-box">
                    <div class="metric-label">Balance</div>
                    <div id="stat-balance" class="metric-value c-green">₹0.00</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Outstanding</div>
                    <div id="stat-outstanding" class="metric-value c-amber">₹0.00</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Penalty</div>
                    <div id="stat-penalty" class="metric-value c-red">₹0/day</div>
                </div>
            </div>
        </div>

        <!-- NAVIGATION CONTROL MATRIX -->
        <div class="tab-navigation">
            <button class="tab-btn active" onclick="switchActiveTab('panel-weekly')">7-Day</button>
            <button class="tab-btn" onclick="switchActiveTab('panel-taxes')">Taxes</button>
            <button class="tab-btn" onclick="switchActiveTab('panel-custom')">Custom</button>
            <button class="tab-btn" onclick="switchActiveTab('panel-issue')">Issue</button>
        </div>

        <!-- TAB LAYER 1: REGULAR INVOICES -->
        <div id="panel-weekly" class="tab-panel active card">
            <h2>Regular 7-Day Invoices</h2>
            <div id="regular-bills-container" class="list-box"></div>
        </div>

        <!-- TAB LAYER 2: SYSTEM TAXATION MATRIX -->
        <div id="panel-taxes" class="tab-panel card">
            <h2>Daily Dynamic Taxes</h2>
            <div id="taxes-container" class="list-box"></div>
        </div>

        <!-- TAB LAYER 3: DYNAMIC CUSTOM MATRIX -->
        <div id="panel-custom" class="tab-panel card">
            <h2>Custom Bills Ledger Matrix</h2>
            <div id="custom-bills-container" class="list-box"></div>
        </div>

        <!-- TAB LAYER 4: EMISSION SYSTEM UTILITY -->
        <div id="panel-issue" class="tab-panel card">
            <h2>Issue Ad-hoc Invoice</h2>
            <div class="form-group">
                <label>Invoice Label Description</label>
                <input type="text" id="cust-desc" placeholder="e.g., Server Cluster Maintenance Fee">
            </div>
            <div class="form-group">
                <label>Amount (CEN)</label>
                <input type="number" id="cust-amount" placeholder="0.00" min="1">
            </div>
            <button class="btn-action" onclick="createCustomBill()">Emit Invoice To Registry</button>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://centrol-bank-default-rtdb.asia-southeast1.firebasedatabase.app" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = "pranshi_main";

    const BASELINE_DATE = new Date("2026-05-16T00:00:00").getTime(); 
    
    let userBalance = 0;
    let entireDataCache = {};

    const MonthlyPrices = {
        water: 400, gas: 200, rent: 15000, dish_tv: 200,
        fees: 7000, society: 250, insurance: 2500, maid: 500,
        parking: 150, security: 300, extra: 1000
    };

    /* INTERFACE TAB MANAGER ENGINE */
    function switchActiveTab(panelId) {
        document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(panelId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function getWeeklyElectricityRate(timestamp) {
        const date = new Date(timestamp);
        const month = date.getMonth(); 
        const day = date.getDate();

        let isWinterRate = false;
        if (month === 10 || month === 11 || month === 0 || month === 1) {
            isWinterRate = true;
        } else if (month === 2 && day <= 20) {
            isWinterRate = true;
        }

        const monthlyRate = isWinterRate ? 500 : 6000;
        return (monthlyRate * 7) / 30; 
    }

    function generateLocalBreakdown(timestamp) {
        let breakdown = {};
        Object.entries(MonthlyPrices).forEach(([key, val]) => {
            breakdown[key] = { amount: Math.round(((val * 7) / 30) * 100) / 100, status: "UNPAID" };
        });
        const elecAmount = getWeeklyElectricityRate(timestamp);
        breakdown['electricity'] = { amount: Math.round(elecAmount * 100) / 100, status: "UNPAID" };
        return breakdown;
    }

    db.ref(`users/${userId}`).on('value', async (snap) => {
        entireDataCache = snap.val() || {};
        userBalance = parseFloat(entireDataCache.balance) || 0;
        document.getElementById('stat-balance').innerText = `₹${userBalance.toFixed(2)}`;
        
        await runBillingChronologyEngine();
    });

    async function runBillingChronologyEngine() {
        const now = Date.now();
        
        const daysSinceDeployment = Math.floor((now - BASELINE_DATE) / (24 * 60 * 60 * 1000)) + 1;
        const weeksElapsed = Math.floor((daysSinceDeployment - 1) / 7) + 1;

        let updates = {};
        let penaltyAccumulatedToday = 0;
        let totalOutstandingCapital = 0;

        if (!entireDataCache.cen_regular_tracking) {
            updates['cen_regular_tracking'] = { initial_week_processed: 0 };
        }
        const regularTracking = entireDataCache.cen_regular_tracking || { initial_week_processed: 0 };
        
        for (let w = regularTracking.initial_week_processed + 1; w <= weeksElapsed; w++) {
            let weekTargetBaseTime = BASELINE_DATE + ((w - 1) * 7 * 24 * 60 * 60 * 1000);
            let breakdown = generateLocalBreakdown(weekTargetBaseTime);
            let finalWeekCost = Object.values(breakdown).reduce((sum, item) => sum + item.amount, 0);

            let newWeekRef = db.ref(`users/${userId}/cen_regular_bills`).push();
            updates[`cen_regular_bills/${newWeekRef.key}`] = {
                week_index: w,
                amount: Math.round(finalWeekCost * 100) / 100,
                generated_timestamp: weekTargetBaseTime,
                due_timestamp: weekTargetBaseTime + (7 * 24 * 60 * 60 * 1000),
                breakdown: breakdown,
                status: "UNPAID"
            };
            updates['cen_regular_tracking/initial_week_processed'] = w;
        }

        if (!entireDataCache.cen_tax_tracking) {
            updates['cen_tax_tracking'] = { last_day_processed: 0 };
        }
        const taxTracking = entireDataCache.cen_tax_tracking || { last_day_processed: 0 };
        
        for (let d = taxTracking.last_day_processed + 1; d <= daysSinceDeployment; d++) {
            let dayTargetTimestamp = BASELINE_DATE + ((d - 1) * 24 * 60 * 60 * 1000);
            let randomTaxValue = Math.floor(Math.random() * (900 - 400 + 1)) + 400;

            let newTaxRef = db.ref(`users/${userId}/cen_taxes`).push();
            updates[`cen_taxes/${newTaxRef.key}`] = {
                day_index: d,
                amount: randomTaxValue,
                generated_timestamp: dayTargetTimestamp,
                due_timestamp: dayTargetTimestamp + (7 * 24 * 60 * 60 * 1000),
                status: "UNPAID"
            };
            updates['cen_tax_tracking/last_day_processed'] = d;
        }

        if (Object.keys(updates).length > 0) {
            await db.ref(`users/${userId}`).update(updates);
            return; 
        }

        const regularBills = entireDataCache.cen_regular_bills || {};
        Object.entries(regularBills).forEach(([key, bill]) => {
            if (bill.status === "UNPAID") {
                let remainingAmount = 0;
                let activeBreakdown = bill.breakdown || generateLocalBreakdown(bill.generated_timestamp || BASELINE_DATE);
                
                Object.values(activeBreakdown).forEach(item => {
                    if (item.status === "UNPAID") remainingAmount += item.amount;
                });

                totalOutstandingCapital += remainingAmount;
                
                if (remainingAmount > 0 && now > bill.due_timestamp) {
                    penaltyAccumulatedToday += 700; 
                }
            }
        });

        const taxBills = entireDataCache.cen_taxes || {};
        Object.entries(taxBills).forEach(([key, tax]) => {
            if (tax.status === "UNPAID") {
                totalOutstandingCapital += tax.amount;
                if (now > tax.due_timestamp) {
                    penaltyAccumulatedToday += 100;
                }
            }
        });

        const customBills = entireDataCache.cen_custom_bills || {};
        Object.entries(customBills).forEach(([key, cbill]) => {
            if (cbill.status === "UNPAID") {
                totalOutstandingCapital += cbill.amount;
                if (now > cbill.due_timestamp) {
                    penaltyAccumulatedToday += 100;
                }
            }
        });

        if (penaltyAccumulatedToday > 0 && userBalance > 0) {
            let lastDeduct = entireDataCache.last_penalty_deduction_time || 0;
            if (now - lastDeduct > 60000) { 
                let minuteFractionDeduction = penaltyAccumulatedToday / 1440; 
                let prospectiveBalance = userBalance - minuteFractionDeduction;
                if (prospectiveBalance < 0) prospectiveBalance = 0;
                
                await db.ref(`users/${userId}`).update({
                    balance: Math.round(prospectiveBalance * 100000) / 100000,
                    last_penalty_deduction_time: now
                });
            }
        }

        document.getElementById('stat-outstanding').innerText = `₹${totalOutstandingCapital.toFixed(2)}`;
        document.getElementById('stat-penalty').innerText = `₹${penaltyAccumulatedToday}/day`;

        renderAllInterfaceViews(regularBills, taxBills, customBills);
    }

    function toggleDropdown(id) {
        const panel = document.getElementById(id);
        const currentDisplay = window.getComputedStyle(panel).display;
        panel.style.display = (currentDisplay === 'block') ? 'none' : 'block';
    }

    function renderAllInterfaceViews(reg, tax, cust) {
        const regBox = document.getElementById('regular-bills-container');
        
        const openDropdownIds = [];
        document.querySelectorAll('.breakdown-container').forEach(el => {
            if (el.style.display === 'block') openDropdownIds.push(el.id);
        });

        regBox.innerHTML = "";
        Object.entries(reg).reverse().forEach(([key, b]) => {
            let isOverdue = Date.now() > b.due_timestamp && b.status === "UNPAID";
            let currentRemaining = 0;
            let itemRowsHtml = "";
            
            let activeBreakdown = b.breakdown || generateLocalBreakdown(b.generated_timestamp || BASELINE_DATE);

            Object.entries(activeBreakdown).forEach(([itemName, itemData]) => {
                let cost = parseFloat(itemData.amount) || 0;
                let itemStatus = itemData.status || "UNPAID";
                
                if (b.status === "PAID") {
                    itemStatus = "PAID";
                }

                if (itemStatus === "UNPAID") {
                    currentRemaining += cost;
                }
                
                itemRowsHtml += `
                    <div class="breakdown-row">
                        <span class="breakdown-label">${itemName.replace('_',' ')}</span>
                        <div style="display:flex; align-items:center; gap:12px;">
                            <span style="font-family:monospace; font-weight:600;">₹${cost.toFixed(2)}</span>
                            ${itemStatus === 'UNPAID' 
                                ? `<button class="btn-pay" onclick="settleSeparateItem('${key}', '${itemName}', ${cost})">PAY</button>` 
                                : '<span class="status-badge c-green">PAID</span>'}
                        </div>
                    </div>`;
            });

            if (b.status === "PAID") currentRemaining = 0;

            const isCurrentlyOpen = openDropdownIds.includes(`drop-${key}`) ? 'style="display: block;"' : '';

            regBox.innerHTML += `
                <div class="bill-row bill-clickable" style="${isOverdue ? 'border-color:var(--accent-red);' : ''}" onclick="toggleDropdown('drop-${key}')">
                    <div class="bill-info">
                        <strong>Week #${b.week_index} Statement ▾</strong>
                        <span class="bill-meta">Due: ${new Date(b.due_timestamp || BASELINE_DATE).toLocaleDateString()}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;" onclick="event.stopPropagation();">
                        <span class="c-amber" style="font-family:monospace; font-weight:700;">₹${currentRemaining.toFixed(2)}</span>
                        ${b.status === 'UNPAID' 
                            ? `<button class="btn-pay btn-pay-all" onclick="settleFullWeek('${key}', ${currentRemaining})">PAY WEEK</button>` 
                            : '<span class="status-badge c-green">PAID</span>'}
                    </div>
                </div>
                <div id="drop-${key}" class="breakdown-container" ${isCurrentlyOpen}>
                    ${itemRowsHtml}
                </div>`;
        });

        const taxBox = document.getElementById('taxes-container');
        taxBox.innerHTML = "";
        Object.entries(tax).reverse().slice(0, 30).forEach(([key, t]) => {
            let isOverdue = Date.now() > t.due_timestamp && t.status === "UNPAID";
            taxBox.innerHTML += `
                <div class="bill-row" style="${isOverdue ? 'border-color:var(--accent-red);' : ''}">
                    <div class="bill-info">
                        <strong>Day ${t.day_index} System Tax</strong>
                        <span class="bill-meta">Due: ${new Date(t.due_timestamp).toLocaleDateString()}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span class="c-red" style="font-family:monospace; font-weight:700;">₹${t.amount}</span>
                        ${t.status === 'UNPAID' ? `<button class="btn-pay" onclick="settleInvoice('cen_taxes', '${key}', ${t.amount})">PAY</button>` : '<span class="status-badge c-green">PAID</span>'}
                    </div>
                </div>`;
        });

        const custBox = document.getElementById('custom-bills-container');
        custBox.innerHTML = "";
        Object.entries(cust).reverse().forEach(([key, c]) => {
            let isOverdue = Date.now() > c.due_timestamp && c.status === "UNPAID";
            custBox.innerHTML += `
                <div class="bill-row" style="${isOverdue ? 'border-color:var(--accent-red);' : ''}">
                    <div class="bill-info">
                        <strong>${c.description}</strong>
                        <span class="bill-meta">Due: ${new Date(c.due_timestamp).toLocaleDateString()}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span class="c-blue" style="font-family:monospace; font-weight:700;">₹${c.amount}</span>
                        ${c.status === 'UNPAID' ? `<button class="btn-pay" onclick="settleInvoice('cen_custom_bills', '${key}', ${c.amount})">PAY</button>` : '<span class="status-badge c-green">SETTLED</span>'}
                    </div>
                </div>`;
        });
    }

    async function settleFullWeek(weekKey, remainingAmount) {
        if (remainingAmount <= 0) return alert("This invoice has already been fully completed.");
        if (userBalance < remainingAmount) return alert("Insufficient balance to complete total weekly settlement.");

        let targetBalance = Math.round((userBalance - remainingAmount) * 100000) / 100000;
        let updates = {};
        updates[`balance`] = targetBalance;
        updates[`cen_regular_bills/${weekKey}/status`] = "PAID";
        
        let targetBill = entireDataCache.cen_regular_bills[weekKey];
        let activeBreakdown = targetBill.breakdown || generateLocalBreakdown(targetBill.generated_timestamp || BASELINE_DATE);

        Object.keys(activeBreakdown).forEach(itemName => {
            updates[`cen_regular_bills/${weekKey}/breakdown/${itemName}/status`] = "PAID";
            updates[`cen_regular_bills/${weekKey}/breakdown/${itemName}/amount`] = activeBreakdown[itemName].amount;
        });

        let historyRef = db.ref(`users/${userId}/history`).push();
        updates[`history/${historyRef.key}`] = {
            amount: -remainingAmount,
            description: `CEN PAY REGISTRY: FULL WEEK RECONCILIATION SUCCESSFUL`,
            timestamp: new Date().toLocaleString(),
            type: "DEBIT"
        };

        await db.ref(`users/${userId}`).update(updates);
        alert("Entire week invoice successfully settled and cleared.");
    }

    async function settleSeparateItem(weekKey, itemName, itemAmount) {
        if (userBalance < itemAmount) return alert("Insufficient balance to execute item settlement.");

        let targetBalance = Math.round((userBalance - itemAmount) * 100000) / 100000;
        let updates = {};
        updates[`balance`] = targetBalance;
        
        let targetBill = entireDataCache.cen_regular_bills[weekKey];
        let activeBreakdown = targetBill.breakdown || generateLocalBreakdown(targetBill.generated_timestamp || BASELINE_DATE);

        Object.entries(activeBreakdown).forEach(([name, data]) => {
            updates[`cen_regular_bills/${weekKey}/breakdown/${name}/amount`] = data.amount;
            updates[`cen_regular_bills/${weekKey}/breakdown/${name}/status`] = (name === itemName) ? "PAID" : (data.status || "UNPAID");
        });

        let allOthersPaid = true;
        Object.entries(activeBreakdown).forEach(([name, data]) => {
            if (name !== itemName && (data.status || "UNPAID") === "UNPAID") {
                allOthersPaid = false;
            }
        });

        if (allOthersPaid) {
            updates[`cen_regular_bills/${weekKey}/status`] = "PAID";
        }

        let historyRef = db.ref(`users/${userId}/history`).push();
        updates[`history/${historyRef.key}`] = {
            amount: -itemAmount,
            description: `CEN PAY REGISTRY: ITEM SETTLED (${itemName.toUpperCase()})`,
            timestamp: new Date().toLocaleString(),
            type: "DEBIT"
        };

        await db.ref(`users/${userId}`).update(updates);
    }

    async function createCustomBill() {
        const desc = document.getElementById('cust-desc').value || "Ad-hoc Registry Charge";
        const amount = parseFloat(document.getElementById('cust-amount').value) || 0;
        if (amount <= 0) return alert("Declare a functional billing amount payload.");

        const now = Date.now();
        await db.ref(`users/${userId}/cen_custom_bills`).push({
            description: desc.toUpperCase(),
            amount: amount,
            generated_timestamp: now,
            due_timestamp: now + (24 * 60 * 60 * 1000), 
            status: "UNPAID"
        });

        document.getElementById('cust-desc').value = "";
        document.getElementById('cust-amount').value = "";
        alert("Custom invoice emitted successfully.");
    }

    async function settleInvoice(nodePath, key, amount) {
        if (userBalance < amount) return alert("Insufficient balance to execute full transaction processing.");

        let targetBalance = Math.round((userBalance - amount) * 100000) / 100000;
        let updates = {};
        updates[`balance`] = targetBalance;
        updates[`${nodePath}/${key}/status`] = "PAID";

        let historyRef = db.ref(`users/${userId}/history`).push();
        updates[`history/${historyRef.key}`] = {
            amount: -amount,
            description: `CEN PAY RECONCILIATION: CLEARED (${nodePath.replace('cen_','').toUpperCase()})`,
            timestamp: new Date().toLocaleString(),
            type: "DEBIT"
        };

        await db.ref(`users/${userId}`).update(updates);
        alert("Payment completed successfully.");
    }
</script>
