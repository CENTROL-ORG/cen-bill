<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEN PAY SYSTEM & BILLING REGISTRY</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 30px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1050px; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .card { background: #111; border: 1px solid #222; padding: 25px; border-radius: 16px; box-sizing: border-box; }
        .full-width { grid-column: span 2; }
        h2 { margin-top: 0; font-weight: 800; letter-spacing: -0.5px; font-size: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .accent-green { color: #00ff88; }
        .accent-red { color: #ff0033; }
        .accent-blue { color: #00e1ff; }
        .accent-amber { color: #ffb300; }
        
        .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .metric-box { background: #161616; padding: 15px; border-radius: 10px; border-left: 4px solid #222; }
        .metric-box.bal { border-left-color: #00ff88; }
        .metric-box.penal { border-left-color: #ff0033; }
        .metric-box.due { border-left-color: #ffb300; }
        .metric-label { font-size: 11px; color: #666; font-weight: bold; text-transform: uppercase; }
        .metric-value { font-size: 22px; font-weight: bold; margin-top: 5px; font-family: monospace; }

        .bill-row { background: #161616; padding: 12px 15px; border-radius: 8px; border: 1px solid #222; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .bill-info { display: flex; flex-direction: column; gap: 2px; }
        .bill-meta { font-size: 11px; color: #666; }
        .btn-pay { background: #00ff88; color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-pay:hover { background: #00cc6e; }
        .btn-pay.disabled { background: #222; color: #555; cursor: not-allowed; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #888; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        input:focus { border-color: #00ff88; }
        .btn-action { width: 100%; background: #00e1ff; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        .list-box { max-height: 320px; overflow-y: auto; padding-right: 5px; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="card full-width">
            <h2 style="border:none; padding:0; margin-bottom:15px;">🏛️ CEN SYSTEM ACCOUNT PAYMENTS REGISTER</h2>
            <div class="metrics">
                <div class="metric-box bal">
                    <div class="metric-label">Bank Liquid Balance</div>
                    <div id="stat-balance" class="metric-value accent-green">₹0.00</div>
                </div>
                <div class="metric-box due">
                    <div class="metric-label">Total Outstandings</div>
                    <div id="stat-outstanding" class="metric-value accent-amber">₹0.00</div>
                </div>
                <div class="metric-box penal">
                    <div class="metric-label">Active Penalty Multiplier</div>
                    <div id="stat-penalty" class="metric-value accent-red">₹0/day</div>
                </div>
            </div>
        </div>

        <!-- SECTION 1: REGULAR WEEKLY BILL GENERATOR -->
        <div class="card">
            <h2>Regular 7-Day Invoices <span id="reg-timer" class="accent-blue" style="font-size:12px; font-family:monospace;"></span></h2>
            <div id="regular-bills-container" class="list-box"></div>
        </div>

        <!-- SECTION 2: DAILY PROGRESSIVE TAXES -->
        <div class="card">
            <h2>Daily Dynamic Taxes (400-900)</h2>
            <div id="taxes-container" class="list-box"></div>
        </div>

        <!-- SECTION 3: CUSTOM BILL GENERATOR & LOGS -->
        <div class="card">
            <h2>Issue Ad-hoc Custom Invoices</h2>
            <div class="form-group">
                <label>Invoice Label Description</label>
                <input type="text" id="cust-desc" placeholder="e.g., Server Cluster Maintenance Fee">
            </div>
            <div class="form-group">
                <label>Amount (CEN)</label>
                <input type="number" id="cust-amount" placeholder="0.00" min="1">
            </div>
            <button class="btn-action" onclick="createCustomBill()">EMIT INVOICE TO REGISTRY</button>
        </div>

        <!-- SECTION 4: ACTIVE CUSTOM LEDGERS -->
        <div class="card">
            <h2>Custom Bills Ledger Matrix</h2>
            <div id="custom-bills-container" class="list-box"></div>
        </div>

    </div>

<script>
    const firebaseConfig = { databaseURL: "https://centrol-bank-default-rtdb.asia-southeast1.firebasedatabase.app" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = "pranshi_main";

    // Deployment Baseline Lock: May 16, 2026
    const BASELINE_DATE = new Date("2026-05-16T00:00:00").getTime(); 
    
    let userBalance = 0;
    let entireDataCache = {};

    // Base Monthly Rate Registry
    const MonthlyPrices = {
        water: 400, gas: 200, rent: 15000, dish_tv: 200,
        fees: 7000, society: 250, insurance: 2500, maid: 500,
        parking: 150, security: 300, extra: 1000
    };

    // Calculate dynamic electricity based on day tracking
    function getWeeklyElectricityRate(daysElapsed) {
        let cycleDay = daysElapsed % 626; // Total combined full cycle days (200 + 90 + 246 + 90)
        if (cycleDay < 200) return (6000 * 7) / 30;
        if (cycleDay < 290) return (1000 * 7) / 30;
        if (cycleDay < 536) return (6000 * 7) / 30;
        return (1000 * 7) / 30;
    }

    // Connect Engine Listener
    db.ref(`users/${userId}`).on('value', async (snap) => {
        entireDataCache = snap.val() || {};
        userBalance = parseFloat(entireDataCache.balance) || 0;
        document.getElementById('stat-balance').innerText = `₹${userBalance.toFixed(2)}`;
        
        await runBillingChronologyEngine();
    });

    async function runBillingChronologyEngine() {
        const now = Date.now();
        const daysSinceDeployment = Math.floor((now - BASELINE_DATE) / (24 * 60 * 60 * 1000));
        const weeksElapsed = Math.floor(daysSinceDeployment / 7);

        let updates = {};
        let penaltyAccumulatedToday = 0;
        let totalOutstandingCapital = 0;

        // --- 1. CORE WEEKLY REGULAR INVOICES MATRIX ---
        if (!entireDataCache.cen_regular_tracking) {
            updates['cen_regular_tracking'] = { initial_week_processed: 0 };
        }
        const regularTracking = entireDataCache.cen_regular_tracking || { initial_week_processed: 0 };
        
        // Auto-generate missing weeks
        for (let w = regularTracking.initial_week_processed + 1; w <= weeksElapsed; w++) {
            let weekTargetBaseTime = BASELINE_DATE + (w * 7 * 24 * 60 * 60 * 1000);
            let daysAtWeekInvoice = Math.floor((weekTargetBaseTime - BASELINE_DATE) / (24 * 60 * 60 * 1000));
            
            let staticWeeklySum = 0;
            Object.values(MonthlyPrices).forEach(val => { staticWeeklySum += (val * 7) / 30; });
            const dynamicElectricity = getWeeklyElectricityRate(daysAtWeekInvoice);
            const finalWeekCost = staticWeeklySum + dynamicElectricity;

            let newWeekRef = db.ref(`users/${userId}/cen_regular_bills`).push();
            updates[`cen_regular_bills/${newWeekRef.key}`] = {
                week_index: w,
                amount: Math.round(finalWeekCost * 100) / 100,
                generated_timestamp: weekTargetBaseTime,
                due_timestamp: weekTargetBaseTime + (7 * 24 * 60 * 60 * 1000),
                status: "UNPAID"
            };
            updates['cen_regular_tracking/initial_week_processed'] = w;
        }

        // --- 2. DAILY AUTOMATED TAX GENERATION MATRIX ---
        if (!entireDataCache.cen_tax_tracking) {
            updates['cen_tax_tracking'] = { last_day_processed: 0 };
        }
        const taxTracking = entireDataCache.cen_tax_tracking || { last_day_processed: 0 };
        
        for (let d = taxTracking.last_day_processed + 1; d <= daysSinceDeployment; d++) {
            let dayTargetTimestamp = BASELINE_DATE + (d * 24 * 60 * 60 * 1000);
            let randomTaxValue = Math.floor(Math.random() * (900 - 400 + 1)) + 400;

            let newTaxRef = db.ref(`users/${userId}/cen_taxes`).push();
            updates[`cen_taxes/${newTaxRef.key}`] = {
                day_index: d,
                amount: randomTaxValue,
                generated_timestamp: dayTargetTimestamp,
                due_timestamp: dayTargetTimestamp + (7 * 24 * 60 * 60 * 1000),
                status: "UNPAID"
            };
            updates['cen_tax_tracking/last_day_processed'] = d;
        }

        // Execute generation loops synchronously before counting penalties
        if (Object.keys(updates).length > 0) {
            await db.ref(`users/${userId}`).update(updates);
            return; // Engine re-fires on internal database layout modification
        }

        // --- 3. DYNAMIC CRUNCH PENALTY RUNTIME ENGINE ---
        const regularBills = entireDataCache.cen_regular_bills || {};
        Object.entries(regularBills).forEach(([key, bill]) => {
            if (bill.status === "UNPAID") {
                totalOutstandingCapital += bill.amount;
                if (now > bill.due_timestamp) {
                    let overdueDays = Math.floor((now - bill.due_timestamp) / (24 * 60 * 60 * 1000)) + 1;
                    penaltyAccumulatedToday += 700; 
                }
            }
        });

        const taxBills = entireDataCache.cen_taxes || {};
        Object.entries(taxBills).forEach(([key, tax]) => {
            if (tax.status === "UNPAID") {
                totalOutstandingCapital += tax.amount;
                if (now > tax.due_timestamp) {
                    penaltyAccumulatedToday += 100;
                }
            }
        });

        const customBills = entireDataCache.cen_custom_bills || {};
        Object.entries(customBills).forEach(([key, cbill]) => {
            if (cbill.status === "UNPAID") {
                totalOutstandingCapital += cbill.amount;
                if (now > cbill.due_timestamp) {
                    penaltyAccumulatedToday += 100;
                }
            }
        });

        // Auto-Deduct Punishment Fees safely (Does not drop below 0 balance)
        if (penaltyAccumulatedToday > 0 && userBalance > 0) {
            // Check if penalty has already been executed for this discrete minute/hour block to prevent infinite loops
            let lastDeduct = entireDataCache.last_penalty_deduction_time || 0;
            if (now - lastDeduct > 60000) { // Limit automated balance matching intervals
                let deductions = penaltyAccumulatedToday / 1440; // Convert daily weight to minutes fraction
                let prospectiveBalance = userBalance - deductions;
                if (prospectiveBalance < 0) prospectiveBalance = 0;
                
                await db.ref(`users/${userId}`).update({
                    balance: Math.round(prospectiveBalance * 100000) / 100000,
                    last_penalty_deduction_time: now
                });
            }
        }

        // UI Metrics Synchronization
        document.getElementById('stat-outstanding').innerText = `₹${totalOutstandingCapital.toFixed(2)}`;
        document.getElementById('stat-penalty').innerText = `₹${penaltyAccumulatedToday}/day`;

        renderAllInterfaceViews(regularBills, taxBills, customBills, daysSinceDeployment);
    }

    function renderAllInterfaceViews(reg, tax, cust, currentDay) {
        // Render Regular Invoices
        const regBox = document.getElementById('regular-bills-container');
        regBox.innerHTML = "";
        Object.entries(reg).reverse().forEach(([key, b]) => {
            let isOverdue = Date.now() > b.due_timestamp && b.status === "UNPAID";
            regBox.innerHTML += `
                <div class="bill-row" style="${isOverdue ? 'border-color:#ff0033;' : ''}">
                    <div class="bill-info">
                        <strong>Week #${b.week_index} Cycle Bill</strong>
                        <span class="bill-meta">Matures: ${new Date(b.due_timestamp).toLocaleDateString()}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span class="accent-amber" style="font-family:monospace; font-weight:bold;">₹${b.amount.toFixed(2)}</span>
                        ${b.status === 'UNPAID' ? `<button class="btn-pay" onclick="settleInvoice('cen_regular_bills', '${key}', ${b.amount})">PAY</button>` : '<span class="accent-green">PAID</span>'}
                    </div>
                </div>`;
        });

        // Render Tax Log
        const taxBox = document.getElementById('taxes-container');
        taxBox.innerHTML = "";
        Object.entries(tax).reverse().slice(0, 30).forEach(([key, t]) => {
            let isOverdue = Date.now() > t.due_timestamp && t.status === "UNPAID";
            taxBox.innerHTML += `
                <div class="bill-row" style="${isOverdue ? 'border-color:#ff0033;' : ''}">
                    <div class="bill-info">
                        <strong>Day ${t.day_index} Core System Tax</strong>
                        <span class="bill-meta">Grace Limit: ${new Date(t.due_timestamp).toLocaleDateString()}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span class="accent-red" style="font-family:monospace; font-weight:bold;">₹${t.amount}</span>
                        ${t.status === 'UNPAID' ? `<button class="btn-pay" onclick="settleInvoice('cen_taxes', '${key}', ${t.amount})">PAY</button>` : '<span class="accent-green">PAID</span>'}
                    </div>
                </div>`;
        });

        // Render Custom Invoices Ledger
        const custBox = document.getElementById('custom-bills-container');
        custBox.innerHTML = "";
        Object.entries(cust).reverse().forEach(([key, c]) => {
            let isOverdue = Date.now() > c.due_timestamp && c.status === "UNPAID";
            custBox.innerHTML += `
                <div class="bill-row" style="${isOverdue ? 'border-color:#ff0033;' : ''}">
                    <div class="bill-info">
                        <strong>${c.description}</strong>
                        <span class="bill-meta">24H Barrier: ${new Date(c.due_timestamp).toLocaleTimeString()}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span class="accent-blue" style="font-family:monospace; font-weight:bold;">₹${c.amount}</span>
                        ${c.status === 'UNPAID' ? `<button class="btn-pay" onclick="settleInvoice('cen_custom_bills', '${key}', ${c.amount})">PAY</button>` : '<span class="accent-green">SETTLED</span>'}
                    </div>
                </div>`;
        });
    }

    async function createCustomBill() {
        const desc = document.getElementById('cust-desc').value || "Ad-hoc Registry Charge";
        const amount = parseFloat(document.getElementById('cust-amount').value) || 0;
        if (amount <= 0) return alert("Declare a functional billing amount payload.");

        const now = Date.now();
        await db.ref(`users/${userId}/cen_custom_bills`).push({
            description: desc.toUpperCase(),
            amount: amount,
            generated_timestamp: now,
            due_timestamp: now + (24 * 60 * 60 * 1000), // Strict 24 Hour Countdown limit
            status: "UNPAID"
        });

        document.getElementById('cust-desc').value = "";
        document.getElementById('cust-amount').value = "";
    }

    async function settleInvoice(nodePath, key, amount) {
        if (userBalance < amount) return alert("Insufficient central bank balances to process complete settlement execution.");

        let targetBalance = Math.round((userBalance - amount) * 100000) / 100000;
        let updates = {};
        updates[`balance`] = targetBalance;
        updates[`${nodePath}/${key}/status`] = "PAID";

        // Feed directly into your existing ledger dashboard history tracking structure
        let historyRef = db.ref(`users/${userId}/history`).push();
        updates[`history/${historyRef.key}`] = {
            amount: -amount,
            description: `CEN PAY REGISTRY: RECONCILIATION SUCCESSFUL (${nodePath.replace('cen_','').toUpperCase()})`,
            timestamp: new Date().toLocaleString(),
            type: "DEBIT"
        };

        await db.ref(`users/${userId}`).update(updates);
        alert("Invoice successfully processed and cleared.");
    }
</script>
</body>
</html>
